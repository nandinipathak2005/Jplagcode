# 1. SERVER SETTINGS
server.port=8080

# 2. FILE UPLOAD LIMITS (Critical for JPlag ZIPs)
# This prevents "File too large" errors when students upload big projects
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# 3. DATABASE EXCLUSION (Keep this until Member 1/2 are ready)
# This allows the app to run without needing a PostgreSQL connection
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# 4. LOGGING (Helpful for Member 4 to see JPlag progress)
logging.level.com.project=DEBUG